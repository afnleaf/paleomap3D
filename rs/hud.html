<!-- top HUD dock: mirror of .hud-bottom, top-anchored. handle sits at the
     bottom of the sheet so it stays flush with the viewport top edge when
     the sheet is closed (translated up off-screen). top-content holds a
     tab-bar + a carousel of panels; legend is built into panel 0 by hud.js. -->
<div class="hud-top">
  <div class="sheet sheet-top" id="sheet-top">
    <div class="top-content" id="top-content">
      <div class="tab-bar" id="tab-bar" role="tablist">
        <button class="tab-btn active" data-tab="0" role="tab" aria-selected="true">Elevation</button>
        <button class="tab-btn" data-tab="1" role="tab" aria-selected="false">Info</button>
        <button class="tab-btn" data-tab="2" role="tab" aria-selected="false">Instructions</button>
      </div>
      <!-- viewport clips the carousel; tab-panels is a flex row whose translateX
           jumps in 100% increments to expose one panel at a time. height of the
           viewport tracks the active panel's height so the closed sheet retracts
           by exactly the right offset. -->
      <div class="tab-viewport" id="tab-viewport">
        <div class="tab-panels" id="tab-panels">
          <div class="tab-panel" id="panel-elevation" data-panel="0" role="tabpanel"></div>
          <!-- info panel: era heading + age subtext, written by hud.js's paintHud
               on every map index change. placeholder for richer per-era copy. -->
          <div class="tab-panel" id="panel-info" data-panel="1" role="tabpanel">
            <h3 class="info-era">Present-day</h3>
            <p class="info-age">Holocene, 0 Ma</p>
          </div>
          <div class="tab-panel" data-panel="2" role="tabpanel">
            <ul class="instructions-list">
              <li><b>Drag</b> to rotate the globe</li>
              <li><b>Pinch</b> or <b>Scroll</b> to zoom</li>
              <li><b>Slider</b> at the bottom moves through time</li>
              <li><b>Arrow Keys</b> left (past) and right (present)</li>
              <li><b>Play</b> animates through eras at the chosen speed</li>
            </ul>
          </div>
        </div>
      </div>
    </div>
    <button class="sheet-handle sheet-handle-top" id="sheet-handle-top" aria-label="Toggle top tray"></button>
  </div>
</div>


<!-- bottom HUD dock: full-width fixed container. padding-bottom on the dock
     (not a `bottom` offset on the chrome inside) controls the distance from
     the viewport edge, so there's one knob and it can pick up safe-area
     insets later if needed. -->

<div class="hud-bottom">
  <!-- sheet wraps the chrome so it can slide down to close. handle is the
       only drag-affordance: dragging the chrome itself would conflict with
       the slider's own pointer handling. tap = toggle, drag = follow,
       release snaps to nearest state. wired in hud.js. -->
  <div class="sheet" id="sheet">
    <button class="sheet-handle" id="sheet-handle" aria-label="Toggle controls"></button>

  <!-- timeline chrome: title + slider fused into one unit. title used to
       be a top-left overlay; now it lives here so the era name and slider
       thumb position read together. PAST/PRESENT end-labels were redundant
       once the title was present and were removed. -->
  <div class="timeline-chrome">
    <p class="title" id="title">
      <span class="title-era">Present-day</span>
      <span class="title-age">(Holocene, 0 Ma)</span>
    </p>

    <!-- playback controls: play/pause toggles a fixed-cadence stepper that
         reuses the slider's requestIndex pipeline; direction toggles which
         way it steps. wiring lives in hud.js. -->
    <div class="playback-controls">
      <button class="pb-btn" id="playpause" aria-label="Play"><svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><polygon points="6,4 20,12 6,20" fill="currentColor"/></svg></button>
      <button class="pb-btn" id="direction" aria-label="Toward past"><svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><polygon points="12,6 12,18 4,12" fill="currentColor"/><polygon points="20,6 20,18 12,12" fill="currentColor"/></svg></button>
      <button class="pb-btn" id="speed">1&times;</button>
    </div>

    <div class="slider-row">
      <div class="slider" id="slider">
        <!-- track row: prev-tip | track-wrap | next-tip flush together.
             tips are chevron-shaped buttons drawn via CSS (::before clip-path),
             colored to match the track's gradient end-stops so the whole
             control reads as one continuous shape. -->
        <div class="track-with-tips">
          <button class="track-tip" id="prev" aria-label="older"></button>
          <!-- track background is a three-stop gradient (Paleozoic 0-53.70% /
               Mesozoic 53.70-87.96% / Cenozoic 87.96-100%) so the era colors
               live on the track itself, no separate era-bands row needed. -->
          <div class="track-wrap" id="track-wrap">
            <div class="track"></div>
            <!-- boundary tick marks (white vertical lines) injected by hud.js -->
            <div class="thumb" id="thumb"></div>
          </div>
          <button class="track-tip" id="next" aria-label="newer"></button>
        </div>
        <!-- boundary labels (K/Pg, J/K, T/J, P/T, D/C, O/Cm) injected by hud.js -->
        <div class="tick-labels" id="ticklabels"></div>
      </div>
    </div>
  </div>
  </div>
</div>
